<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKTg AI Core - Production Engine</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --border-color: #e0e0e0;
            --text-color: #1a1a1a;
            --accent-color: #d97706;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --disabled-color: #d1d5db;
            --muted-color: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-color);
            padding: 24px;
        }

        h1 {
            font-size: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: var(--accent-color);
            margin-top: 0;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted-color);
            margin-top: -5px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        select, textarea {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            margin-bottom: 4px;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(217,119,6,0.2);
        }

        .counter-container {
            text-align: right;
            font-size: 12px;
            color: var(--muted-color);
            font-family: monospace;
            margin-bottom: 15px;
        }

        .counter-container.limit-reached {
            color: var(--danger-color);
            font-weight: bold;
        }

        .file-upload-group { margin-bottom: 15px; }
        .file-upload-label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .file-upload-label span { font-weight: 400; font-size: 12px; color: var(--muted-color); margin-left: 6px; }
        .file-upload-input { display: none; }

        .file-upload-btn {
            display: inline-block;
            background-color: var(--panel-bg);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--muted-color);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .file-upload-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .file-upload-status {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted-color);
            font-family: monospace;
            min-height: 18px;
        }

        .file-upload-status.success { color: #16a34a; }
        .file-upload-status.error   { color: var(--danger-color); font-weight: bold; }

        .btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover:not(:disabled) { background-color: #15803d; }

        .btn:disabled {
            background-color: var(--disabled-color);
            color: #6b7280;
            cursor: not-allowed;
        }

        .console-panel {
            margin-top: 25px;
            background-color: #e8e8e8;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }

        .console-title {
            color: var(--muted-color);
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
        }

        .log-entry { margin-bottom: 4px; line-height: 1.5; }
        .log-time    { color: #2563eb; }
        .log-info    { color: #374151; }
        .log-success { color: #16a34a; }
        .log-warn    { color: #d97706; }
        .log-danger  { color: #dc2626; }

        .mode-selector-wrap {
            overflow-x: hidden;
        }

        .mode-selector-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 8px 0;
            transform-origin: center top;
        }

        @media (max-width: 600px) {
            .mode-selector-inner {
                transform: scale(0.72);
                margin-bottom: -40px;
            }
        }

        @media (max-width: 400px) {
            .mode-selector-inner {
                transform: scale(0.55);
                margin-bottom: -80px;
            }
        }

        /* ── NAV ── */
        .nktg-nav-desktop {
            display: none;
        }

        .nktg-nav-mobile {
            display: none;
        }

        /* Desktop: sidebar trái */
        @media (min-width: 769px) {
            body {
                padding: 20px 20px 20px 320px;
            }
            .nktg-nav-desktop {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0; left: 0;
                width: 300px;
                height: 100vh;
                background: var(--bg-color);
                border-right: 1px solid var(--border-color);
                padding: 24px 0;
                gap: 4px;
                z-index: 100;
            }
            .nktg-nav-desktop .nav-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 20px;
                color: var(--muted-color);
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                border-radius: 0;
                transition: background 0.2s, color 0.2s;
                text-decoration: none;
                border: none;
                background: transparent;
                width: 100%;
                text-align: left;
            }
            .nktg-nav-desktop .nav-item:hover {
                background: var(--bg-color);
                color: var(--text-color);
            }
            .nktg-nav-desktop .nav-item.active {
                color: #7c3aed;
                font-weight: 600;
            }
            .nktg-nav-desktop .nav-item .nav-icon {
                font-size: 18px;
                width: 24px;
                text-align: center;
                flex-shrink: 0;
            }
            .nktg-nav-desktop .nav-item.active .nav-icon {
                color: #7c3aed;
            }
        }

        /* Mobile: bottom bar */
        @media (max-width: 768px) {
            body {
                padding: 20px 20px 80px 20px;
            }
            .nktg-nav-mobile {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 64px;
                background: var(--bg-color);
                border-top: 1px solid var(--border-color);
                z-index: 100;
                align-items: center;
                justify-content: space-around;
                padding: 0 8px;
            }
            .nktg-nav-mobile .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3px;
                color: var(--muted-color);
                font-size: 10px;
                font-weight: 500;
                cursor: pointer;
                flex: 1;
                padding: 6px 0;
                border: none;
                background: transparent;
                transition: color 0.2s;
            }
            .nktg-nav-mobile .nav-item .nav-icon {
                font-size: 20px;
            }
            .nktg-nav-mobile .nav-item.active {
                color: #7c3aed;
            }
            .nktg-nav-mobile .nav-item.active .nav-icon {
                color: #7c3aed;
            }
        }
        /* ────────── */

        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            background-color: #e5e7eb;
            color: #374151;
            float: right;
        }
    </style>
</head>

<script>
(function(){
    function initNav(navId) {
        const nav = document.getElementById(navId);
        if (!nav) return;
        const items = nav.querySelectorAll('.nav-item');
        items.forEach(btn => {
            btn.addEventListener('click', () => {
                items.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }
    initNav('navDesktop');
    initNav('navMobile');
})();
</script>

<div class="container">
    <div class="status-badge" id="stateBadge" style="display:none;">PIPELINE: IDLE</div>
    <h1>NKTg AI for Organizers</h1>

    <!-- Mode Selector -->
    <div class="form-group mode-selector-wrap">
        <div class="mode-selector-inner">
            <button id="btnTraction" onclick="nktgSelectMode('traction')" style="
                background: transparent;
                border: 1.5px solid #d1d5db;
                border-radius: 999px;
                color: #6b7280;
                font-size: 14px;
                font-weight: 500;
                padding: 10px 36px;
                cursor: pointer;
                transition: color 0.2s, border-color 0.2s;
            ">Extraction</button>

            <canvas id="nktgGalaxy" width="173" height="133" style="flex-shrink:0;"></canvas>

            <button id="btnAddition" onclick="nktgSelectMode('addition')" style="
                background: transparent;
                border: 1.5px solid #d1d5db;
                border-radius: 999px;
                color: #6b7280;
                font-size: 14px;
                font-weight: 600;
                padding: 10px 36px;
                cursor: pointer;
                transition: color 0.2s, border-color 0.2s;
            ">Addition</button>
        </div>
    </div>

    <script>
    (function(){
        const canvas = document.getElementById('nktgGalaxy');
        const ctx = canvas.getContext('2d');
        const W = 173, H = 133, CX = W/2, CY = H/2;
        let currentMode = null;
        const RX=63, RY=16;
        let animAngle=0, animRaf=null;

        function drawGalaxy() {
            ctx.clearRect(0,0,W,H);
            // Đĩa trái cam
            const gL=ctx.createRadialGradient(CX-10,CY,1,CX,CY,RX);
            gL.addColorStop(0,'rgba(255,220,160,0.85)'); gL.addColorStop(0.15,'rgba(255,170,70,0.6)');
            gL.addColorStop(0.45,'rgba(180,70,20,0.4)'); gL.addColorStop(1,'rgba(150,60,10,0)');
            ctx.save(); ctx.beginPath(); ctx.ellipse(CX,CY,RX,RY,0,Math.PI/2,Math.PI*3/2);
            ctx.fillStyle=gL; ctx.fill(); ctx.restore();
            // Đĩa phải cyan
            const gR=ctx.createRadialGradient(CX+10,CY,1,CX,CY,RX);
            gR.addColorStop(0,'rgba(180,240,250,0.85)'); gR.addColorStop(0.15,'rgba(60,210,230,0.6)');
            gR.addColorStop(0.45,'rgba(20,110,150,0.4)'); gR.addColorStop(1,'rgba(10,70,100,0)');
            ctx.save(); ctx.beginPath(); ctx.ellipse(CX,CY,RX,RY,0,-Math.PI/2,Math.PI/2);
            ctx.fillStyle=gR; ctx.fill(); ctx.restore();
            // Plasma nón trên
            const gPT=ctx.createLinearGradient(CX,CY,CX,CY-43);
            gPT.addColorStop(0,'rgba(180,140,255,0.5)'); gPT.addColorStop(0.5,'rgba(130,70,230,0.25)'); gPT.addColorStop(1,'rgba(100,40,200,0.03)');
            ctx.save(); ctx.beginPath(); ctx.moveTo(CX-2,CY); ctx.lineTo(CX+2,CY); ctx.lineTo(CX+11,CY-43); ctx.lineTo(CX-11,CY-43); ctx.closePath(); ctx.fillStyle=gPT; ctx.fill(); ctx.restore();
            // Plasma nón dưới
            const gPB=ctx.createLinearGradient(CX,CY,CX,CY+43);
            gPB.addColorStop(0,'rgba(180,140,255,0.5)'); gPB.addColorStop(0.5,'rgba(130,70,230,0.25)'); gPB.addColorStop(1,'rgba(100,40,200,0.03)');
            ctx.save(); ctx.beginPath(); ctx.moveTo(CX-2,CY); ctx.lineTo(CX+2,CY); ctx.lineTo(CX+11,CY+43); ctx.lineTo(CX-11,CY+43); ctx.closePath(); ctx.fillStyle=gPB; ctx.fill(); ctx.restore();
            // Lõi
            const gC=ctx.createRadialGradient(CX,CY,0,CX,CY,5);
            gC.addColorStop(0,'rgba(255,255,255,1)'); gC.addColorStop(0.5,'rgba(220,200,255,0.8)'); gC.addColorStop(1,'rgba(160,120,255,0)');
            ctx.beginPath(); ctx.ellipse(CX,CY,5,2.5,0,0,Math.PI*2); ctx.fillStyle=gC; ctx.fill();
            // Xoắn ốc theo mode
            if(currentMode) drawSpiral(currentMode, animAngle);
        }

        function drawArrow(p0,p1,col){
            const dx=p1.x-p0.x,dy=p1.y-p0.y,l=Math.sqrt(dx*dx+dy*dy);
            if(l<1)return;
            const ux=dx/l,uy=dy/l,px=-uy,py=ux;
            const mx=(p0.x+p1.x)/2,my=(p0.y+p1.y)/2;
            ctx.save(); ctx.beginPath();
            ctx.moveTo(mx-ux*5+px*2.5,my-uy*5+py*2.5); ctx.lineTo(mx+ux*1.5,my+uy*1.5); ctx.lineTo(mx-ux*5-px*2.5,my-uy*5-py*2.5);
            ctx.strokeStyle=col; ctx.lineWidth=0.9; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke(); ctx.restore();
        }

        function spt(f,t){ const r=3+(1-f)*52, a=-(f*Math.PI*2*1.5)+t; return{x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)*0.28}; }
        function sptAdd(f,t){ const r=3+f*52, a=-(f*Math.PI*2*1.5)-t; return{x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)*0.28}; }

        function drawSpiral(m, t) {
            const isExt = m === 'traction';
            const s=200, pts=[];
            for(let i=0;i<=s;i++) pts.push(isExt ? spt(i/s,t) : sptAdd(i/s,t));
            ctx.save(); ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
            for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
            ctx.strokeStyle = isExt ? 'rgba(190,55,15,0.65)' : 'rgba(30,140,60,0.65)';
            ctx.lineWidth=0.9; ctx.lineCap='round';
            ctx.shadowColor = isExt ? 'rgba(190,55,15,0.2)' : 'rgba(30,140,60,0.2)';
            ctx.shadowBlur=2; ctx.stroke(); ctx.restore();
            const i = Math.floor(s*(isExt?0.32:0.55));
            const col = isExt ? 'rgba(190,55,15,.9)' : 'rgba(30,140,60,.9)';
            drawArrow(pts[i], pts[i+8], col);
        }

        function startAnim(){
            if(animRaf) cancelAnimationFrame(animRaf);
            function loop(){
                drawGalaxy();
                if(currentMode==='traction') animAngle-=0.014;
                else if(currentMode==='addition') animAngle+=0.014;
                animRaf=requestAnimationFrame(loop);
            }
            loop();
        }
        function stopAnim(){
            if(animRaf){cancelAnimationFrame(animRaf);animRaf=null;}
            animAngle=0; drawGalaxy();
        }

        window.nktgSelectMode = function(m) {
            if(currentMode === m) {
                currentMode = null;
                document.getElementById('btnTraction').style.color = '#6b7280';
                document.getElementById('btnTraction').style.borderColor = '#d1d5db';
                document.getElementById('btnAddition').style.color = '#6b7280';
                document.getElementById('btnAddition').style.borderColor = '#d1d5db';
                stopAnim(); return;
            }
            const w = document.getElementById('modeWarning');
            if(w) w.style.display = 'none';
            currentMode = m;
            document.getElementById('btnTraction').style.color = '#6b7280';
            document.getElementById('btnTraction').style.borderColor = '#d1d5db';
            document.getElementById('btnAddition').style.color = '#6b7280';
            document.getElementById('btnAddition').style.borderColor = '#d1d5db';
            if(m === 'traction') {
                document.getElementById('btnTraction').style.color = '#E2533A';
                document.getElementById('btnTraction').style.borderColor = '#E2533A';
            } else {
                document.getElementById('btnAddition').style.color = '#4A9B2F';
                document.getElementById('btnAddition').style.borderColor = '#4A9B2F';
            }
            startAnim();
        };

        window.nktgGetMode = function() { return currentMode; };
        drawGalaxy();
    })();
    </script>

    <div id="modeWarning" style="
        display: none;
        margin: 0 0 12px 0;
        padding: 8px 14px;
        background: #fef3c7;
        border: 1px solid #f59e0b;
        border-radius: 6px;
        color: #d97706;
        font-size: 13px;
        font-weight: 600;
    ">⚠ Please select Extraction or Addition before running the pipeline.</div>

    <!-- Input Box -->
    <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label for="queryInput" style="margin-bottom:0;">Input</label>
            <span class="counter-container" id="charCounter" style="margin-bottom:0;">0/21000</span>
        </div>

        <div id="inputWrap" style="
            position: relative;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
        ">
            <textarea id="queryInput" maxlength="21000"
                placeholder="Enter text or click [+] to attach files (.txt, .docx, .pdf)..."
                style="
                    width: 100%;
                    min-height: 120px;
                    background: transparent;
                    border: none;
                    outline: none;
                    color: var(--text-color);
                    font-size: 14px;
                    font-family: inherit;
                    padding: 12px 14px 48px 14px;
                    box-sizing: border-box;
                    resize: vertical;
                    line-height: 1.6;
                "
            ></textarea>

            <div style="
                position: absolute;
                bottom: 0; left: 0; right: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 10px;
                pointer-events: none;
            ">
                <label for="fileInput" id="fileUploadBtn" title="Attach file" aria-label="Attach file" style="
                    pointer-events: all;
                    background: transparent;
                    border: 1px solid var(--border-color);
                    border-radius: 6px;
                    cursor: pointer;
                    display: flex; align-items: center; justify-content: center;
                    width: 30px; height: 30px;
                    color: var(--muted-color);
                    font-size: 20px; line-height: 1;
                    transition: border-color 0.2s, color 0.2s;
                    user-select: none;
                ">+</label>

                <button id="sendArrow" title="Submit" aria-label="Submit" style="
                    pointer-events: all;
                    background: transparent;
                    border: 1px solid #d1d5db;
                    border-radius: 6px;
                    cursor: default;
                    display: flex; align-items: center; justify-content: center;
                    width: 30px; height: 30px;
                    color: #9ca3af;
                    font-size: 16px; line-height: 1;
                    opacity: 0.35;
                    transition: color 0.2s, border-color 0.2s, opacity 0.2s;
                ">↑</button>
            </div>
        </div>

        <input type="file" id="fileInput" class="file-upload-input" accept=".txt,.docx,.pdf">
        <div class="file-upload-status" id="fileUploadStatus" style="margin-top:6px;"></div>
    </div>

    <script>
    (function(){
        const ta      = document.getElementById('queryInput');
        const wrap    = document.getElementById('inputWrap');
        const arrow   = document.getElementById('sendArrow');
        const plusBtn = document.getElementById('fileUploadBtn');
        const COLORS  = { traction: '#E2533A', addition: '#4A9B2F' };
        const fileInput = document.getElementById('fileInput');

        function updateArrow() {
            const hasText = ta.value.trim().length > 0;
            const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
            const mode    = typeof window.nktgGetMode === 'function' ? window.nktgGetMode() : null;
            const color   = mode ? COLORS[mode] : null;
            const warning = document.getElementById('modeWarning');
            if((hasText || hasFile) && !mode) {
                if(warning) warning.style.display = 'block';
            } else {
                if(warning) warning.style.display = 'none';
            }
            if((hasText || hasFile) && color) {
                arrow.style.color       = color;
                arrow.style.borderColor = color;
                arrow.style.opacity     = '1';
                arrow.style.cursor      = 'pointer';
            } else {
                arrow.style.color       = '#9ca3af';
                arrow.style.borderColor = '#d1d5db';
                arrow.style.opacity     = '0.35';
                arrow.style.cursor      = 'default';
            }
        }

        ta.addEventListener('input', updateArrow);
        fileInput.addEventListener('change', updateArrow);
        ta.addEventListener('focus', () => {
            wrap.style.borderColor = 'var(--accent-color)';
            wrap.style.boxShadow   = '0 0 0 3px rgba(217,119,6,0.2)';
        });
        ta.addEventListener('blur', () => {
            wrap.style.borderColor = 'var(--border-color)';
            wrap.style.boxShadow   = 'none';
        });
        plusBtn.addEventListener('mouseover', () => {
            plusBtn.style.borderColor = 'var(--accent-color)';
            plusBtn.style.color       = 'var(--accent-color)';
        });
        plusBtn.addEventListener('mouseout', () => {
            plusBtn.style.borderColor = 'var(--border-color)';
            plusBtn.style.color       = 'var(--muted-color)';
        });
        const origSelectMode = window.nktgSelectMode;
        window.nktgSelectMode = function(m) {
            origSelectMode(m);
            updateArrow();
        };
        updateArrow();
    })();
    </script>

    <div class="console-panel" id="consoleOutput"></div>

</div>
